<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub | Sleek UI</title>
    <style>
        /* 1. Global Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a); /* Deep navy gradient */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. The Card Container */
        .game-card {
            width: 300px;
            background: rgba(255, 255, 255, 0.05); /* Semi-transparent white */
            backdrop-filter: blur(12px); /* The "Glass" blur effect */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border */
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Smooth "pop" animation */
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 3. Hover Effects */
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        /* 4. Game Image */
        .game-img {
            width: 100%;
            height: 180px;
            background-color: #334155; /* Placeholder color */
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 5. Text & Content */
        .game-info {
            padding: 20px;
            text-align: center;
        }

        .game-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .play-btn {
            display: inline-block;
            padding: 10px 25px;
            background: #3b82f6; /* Modern Blue */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .play-btn:hover {
            background: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="game-card">
        <img src="https://via.placeholder.com/300x180" alt="Game Thumbnail" class="game-img">
        <div class="game-info">
            <h3>Cyber Racer</h3>
            <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px;">Fast-paced arcade action.</p>
            <a href="#" class="play-btn">PLAY NOW</a>
        </div>
    </div>

</body>
</html>
