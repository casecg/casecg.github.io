<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caseg</title>
    <style>
        /* 1. The Dark Checkerboard Background (Matches your image) */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #18181a;
            background-image: 
                linear-gradient(45deg, #222225 25%, transparent 25%, transparent 75%, #222225 75%, #222225),
                linear-gradient(45deg, #222225 25%, transparent 25%, transparent 75%, #222225 75%, #222225);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            font-family: sans-serif;
        }

        /* 2. Layout Container to arrange them exactly like the picture */
        .glass-layout {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 3. The Core Glass Physics */
        .glass {
            background: rgba(255, 255, 255, 0.01); /* Almost invisible fill */
            backdrop-filter: blur(8px); /* The optical distortion */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05); /* Faint base border */
            position: relative;
        }

        /* 4. Rectangular/Pill Shapes (Top Light Source) */
        .glass-rect {
            /* The magic edge-lighting and glow */
            box-shadow: 
                inset 0px 2px 3px rgba(255, 255, 255, 0.9), /* Intense top inner light */
                inset 0px -1px 2px rgba(255, 255, 255, 0.1), /* Faint bottom reflection */
                0px -4px 15px rgba(255, 255, 255, 0.4),      /* Glowing top outer aura */
                0px 5px 15px rgba(0, 0, 0, 0.4);             /* Drop shadow for depth */
        }

        /* 5. Circular Shape (Top-Left Light Source) */
        .glass-circle {
            /* Adjusted so the light hits the curve from the top-left */
            box-shadow: 
                inset 3px 3px 5px rgba(255, 255, 255, 0.9), 
                inset -1px -1px 3px rgba(255, 255, 255, 0.1), 
                -4px -4px 20px rgba(255, 255, 255, 0.4),      
                5px 5px 20px rgba(0, 0, 0, 0.4);             
        }

        /* --- Specific Shape Dimensions --- */
        
        .shape-wide {
            width: 240px;
            height: 140px;
            border-radius: 12px;
        }

        .shape-pill {
            width: 240px;
            height: 50px;
            border-radius: 25px; /* Creates the pill shape */
        }

        .shape-tall {
            width: 180px;
            height: 260px;
            border-radius: 12px;
        }

        .shape-round {
            width: 260px;
            height: 260px;
            border-radius: 50%; /* Creates the circle */
        }
    </style>
</head>
<body>

    <div class="glass-layout">
        
        <div class="left-column">
            <div class="glass glass-rect shape-wide"></div>
            <div class="glass glass-rect shape-pill"></div>
        </div>

        <div class="glass glass-rect shape-tall"></div>

        <div class="glass glass-circle shape-round"></div>

    </div>

</body>
</html>
