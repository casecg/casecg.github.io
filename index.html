<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Liquid Glass UI</title>
    <style>
        :root {
            /* Apple-style colors */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-blue: #0071e3;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* Black background makes the glass pop */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }

        /* Animated Background for Reflection Depth */
        .bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1d1d1f 0%, #000000 100%);
            z-index: -2;
        }

        .liquid-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #0071e3, #42a5f5);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.6;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* The Glass Card */
        .card {
            position: relative;
            width: 340px;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%); /* Stronger blur & saturation */
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden; /* Clips the reflection shimmer */
            transition: transform 0.3s ease;
        }

        /* The "Reflecting" Light Streak */
        .card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg, 
                transparent, 
                rgba(255,255,255,0.1) 45%, 
                rgba(255,255,255,0.4) 50%, 
                rgba(255,255,255,0.1) 55%, 
                transparent
            );
            transform: rotate(30deg);
            animation: reflection 6s infinite;
        }

        @keyframes reflection {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }

        .card:hover {
            transform: scale(1.02) translateY(-5px);
        }

        /* Typography */
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.022em; /* Apple's signature tight spacing */
            margin: 20px 0 10px;
            color: var(--text-main);
        }

        p {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            line-height: 1.4;
            margin-bottom: 25px;
            font-weight: 400;
        }

        /* Play Button */
        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 12px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--accent-blue);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 113, 227, 0.4);
        }

        .game-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            background: linear-gradient(135deg, #fff, #d1d1d1);
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="liquid-blob"></div>

    <div class="card">
        <div class="game-icon"></div>
        <h1>Game Title</h1>
        <p>Experience the next generation of unblocked gaming with ultra-smooth visuals.</p>
        <a href="#" class="btn">Play Now</a>
    </div>

</body>
</html>
